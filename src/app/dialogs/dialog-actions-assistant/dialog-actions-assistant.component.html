<!-- src/app/dialogs/dialog-actions-assistant/dialog-actions-assistant.component.html -->
<h2 mat-dialog-title>AI Actions Assistant</h2>

<mat-dialog-content class="mat-typography" style="display:flex; flex-direction: column; gap: 12px;">
    <div *ngFor="let m of messages">
        <strong *ngIf="m.role==='user'">You:</strong>
        <strong *ngIf="m.role==='assistant'">Assistant:</strong>
        <strong *ngIf="m.role==='system'">System:</strong>
        <pre style="white-space: pre-wrap; margin: 0;">{{ m.content }}</pre>
        <mat-divider></mat-divider>
    </div>

    <div *ngIf="proposedCode">
        <h3>Proposed code</h3>
        <pre style="max-height: 320px; overflow: auto; border: 1px solid #ddd; padding: 8px;">{{ proposedCode }}</pre>
    </div>

    <mat-form-field appearance="outline">
        <textarea matInput #prompt rows="3" placeholder="e.g.: set status text, make text_6 visible on t8 when true..."></textarea>
    </mat-form-field>
</mat-dialog-content>

<mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-stroked-button color="primary" (click)="onAsk(prompt.value)" [disabled]="isLoading">Ask assistant</button>
    <button mat-raised-button color="accent" [disabled]="!proposedCode || isLoading" (click)="confirm()">Apply</button>
</mat-dialog-actions>
